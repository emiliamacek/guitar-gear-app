{% extends 'base.html' %}

{% block title %}Delete Gear | ToneVault{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="card border-danger shadow-lg" style="max-width: 500px; background: var(--bg-card, #212529);">
    <div class="card-body text-center p-5">

      <div class="mb-4 text-danger animate__animated animate__pulse animate__infinite">
        <i class="fas fa-exclamation-triangle fa-4x"></i>
      </div>

      <h2 class="text-white mb-3">Remove Gear?</h2>

      <p class="text-muted mb-4">
        Are you sure you want to remove
        <strong class="text-white">{{ object.gear_item.name }}</strong>
        from your collection?<br>
        <span class="small text-danger">This action cannot be undone.</span>
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-danger btn-lg">
            <i class="fas fa-trash me-2"></i> Yes, Remove It
          </button>
          <a href="{% url 'equipment:list' %}" class="btn btn-outline-secondary">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
